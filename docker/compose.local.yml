name: gymgrow-local

services:
  app:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "corepack enable && pnpm install && pnpm dev --hostname 0.0.0.0"
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: 1
      HOSTNAME: 0.0.0.0

volumes:
  node_modules:
