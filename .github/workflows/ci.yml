name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - uat
      - test
      - dev
      - "feature/**"
      - "bugfix/**"
      - "hotfix/**"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    environment: ${{ github.ref_name == 'main' && 'production' ||
      github.ref_name == 'uat' && 'uat' ||
      github.ref_name == 'test' && 'test' ||
      github.ref_name == 'dev' && 'development' ||
      'development' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.5.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create environment file
        run: |
          echo "NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}" >> .env
          echo "NEXT_PUBLIC_API_TIMEOUT=${{ secrets.NEXT_PUBLIC_API_TIMEOUT }}" >> .env

      - name: Build project
        run: pnpm build
